<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Zapier | SaaS Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --discord: #7289da;
            --telegram: #0088cc;
            --success: #10b981;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #334155 100%);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            color: #1a202c;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
        }

        header { text-align: center; margin-bottom: 2rem; position: relative; }
        h2 { font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -1px; color: #1a202c; }
        .subtitle { color: #718096; font-size: 0.9rem; margin-top: 5px; }

        .section-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #a0aec0; margin-bottom: 1rem; display: block; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }

        select, input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        button.main-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button.main-btn:hover { background: #4f46e5; transform: translateY(-2px); }

        .logout-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .auth-toggle { text-align: center; margin-top: 15px; font-size: 0.9rem; color: #718096; }
        .auth-toggle span { color: var(--primary); font-weight: 700; cursor: pointer; }

        #status { margin-top: 1rem; text-align: center; font-size: 14px; font-weight: 600; min-height: 20px; }
        .success-text { color: var(--success); }
        .error-text { color: #ef4444; }

        .hidden { display: none !important; }

        .rule-card { position: relative; background: #ffffff; border: 1px solid #f7fafc; padding: 16px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .delete-btn { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; background: #fee2e2; color: #ef4444; border: none; border-radius: 8px; cursor: pointer; opacity: 0.6; }
        .delete-btn:hover { opacity: 1; transform: scale(1.1); }
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .badge-discord { background: #5865F2; color: white; }
        .badge-telegram { background: #0088cc; color: white; }
        .rule-info { font-weight: 600; font-size: 0.95rem; }
        .rule-payload { margin-top: 8px; padding: 8px 12px; background: #f8fafc; border-radius: 8px; font-size: 0.85rem; color: #64748b; border-left: 3px solid #cbd5e1; }
        .rule-destination { font-size: 0.75rem; color: #a0aec0; margin-top: 4px; font-family: monospace; }
        
        #schedule_options { animation: slideDown 0.3s ease-out forwards; border-left: 3px solid var(--primary); padding-left: 15px; margin-left: 5px; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card-container" id="auth-view">
    <header>
        <h2>Welcome</h2>
        <p class="subtitle" id="auth-subtitle">Sign in to manage your automations</p>
    </header>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="auth_email" placeholder="engineer@mumbai.edu">
    </div>
    
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="auth_password" placeholder="••••••••">
    </div>

    <button class="main-btn" id="login-btn" onclick="handleAuth('login')">Log In</button>
    <button class="main-btn hidden" id="signup-btn" onclick="handleAuth('register')">Create Account</button>

    <div id="auth-status" style="margin-top: 15px; text-align: center; font-weight: 600;"></div>

    <div class="auth-toggle" id="toggle-to-signup">
        Don't have an account? <span onclick="toggleAuthView('signup')">Sign Up</span>
    </div>
    <div class="auth-toggle hidden" id="toggle-to-login">
        Already have an account? <span onclick="toggleAuthView('login')">Log In</span>
    </div>
</div>

<div class="card-container hidden" id="app-view">
    <header>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        <h2>Mini-Zapier</h2>
        <p class="subtitle">Electronics & Telecomms Automation Engine</p>
    </header>
    
    <span class="section-title">Configuration</span>

    <div class="form-group" id="target_id_group">
        <label>Target Channel/Chat ID</label>
        <input type="text" id="target_id" placeholder="Paste Discord Channel ID or Telegram Chat ID">
    </div>
    
    <div class="form-group">
        <label>Trigger Source</label>
        <select id="trigger_source" onchange="toggleScheduleOptions()">
            <option value="Webhook">🌐 Incoming Webhook</option>
            <option value="Schedule">&#x23F2; Schedule Task</option>
        </select>
    </div>

    <div id="schedule_options" class="form-group hidden">
        <label style="color: var(--primary); font-size: 0.8rem;">Select Frequency</label>
        <select id="schedule_type" onchange="toggleTimeInput()">
            <option value="* * * * *">Every Minute</option>
            <option value="0 * * * *">Every Hour</option>
            <option value="custom">Set Specific Time Daily</option>
        </select>
        <div id="custom_time_div" class="hidden" style="margin-top: 10px;">
            <input type="time" id="custom_time">
        </div>
    </div>

    <div class="form-group">
        <label>Action Target</label>
        <select id="action_target">
            <option value="Discord">&#xf392; Send Discord Message</option>
            <option value="Telegram">&#xf2c6; Send Telegram Message</option>
        </select>
    </div>

    <div class="form-group">
        <label>Data Payload</label>
        <input type="text" id="action_payload" placeholder="e.g. System Alert: Motion Detected">
    </div>

    <button class="main-btn" onclick="saveRule()">
        <i class="fas fa-plus-circle"></i> Create Automation
    </button>
    
    <div id="status"></div>

    <div class="rules-container" style="margin-top: 20px;">
        <span class="section-title">Your Workflows</span>
        <div id="rulesList"><p style="text-align:center; color:#a0aec0; font-size: 0.9rem;">Fetching rules...</p></div>
    </div>
</div>

<script>
    const API_BASE = ''; 

    function getAuthHeaders() {
        const token = localStorage.getItem('minizap_token');
        return {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
        };
    }

    function checkAuth() {
        const token = localStorage.getItem('minizap_token');
        if (token) {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            loadRules(); 
        } else {
            document.getElementById('auth-view').classList.remove('hidden');
            document.getElementById('app-view').classList.add('hidden');
        }
    }

    function toggleAuthView(view) {
        document.getElementById('auth-status').innerText = "";
        if (view === 'signup') {
            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('signup-btn').classList.remove('hidden');
            document.getElementById('toggle-to-signup').classList.add('hidden');
            document.getElementById('toggle-to-login').classList.remove('hidden');
            document.getElementById('auth-subtitle').innerText = "Create a new account to get started";
        } else {
            document.getElementById('signup-btn').classList.add('hidden');
            document.getElementById('login-btn').classList.remove('hidden');
            document.getElementById('toggle-to-login').classList.add('hidden');
            document.getElementById('toggle-to-signup').classList.remove('hidden');
            document.getElementById('auth-subtitle').innerText = "Sign in to manage your automations";
        }
    }

    function logout() {
        localStorage.removeItem('minizap_token');
        checkAuth();
    }

    async function handleAuth(action) {
        const email = document.getElementById('auth_email').value;
        const password = document.getElementById('auth_password').value;
        const statusDiv = document.getElementById('auth-status');

        if (!email || !password) {
            statusDiv.innerText = "Please enter email and password.";
            statusDiv.className = "error-text";
            return;
        }

        statusDiv.innerText = "Processing...";
        statusDiv.className = "";

        try {
            const endpoint = action === 'login' ? '/api/auth/login' : '/api/auth/register';
            const response = await fetch(`${API_BASE}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                if (action === 'login') {
                    localStorage.setItem('minizap_token', data.token);
                    document.getElementById('auth_password').value = ""; 
                    checkAuth(); 
                } else {
                    statusDiv.innerText = "Account created! Please log in.";
                    statusDiv.className = "success-text";
                    toggleAuthView('login');
                }
            } else {
                statusDiv.innerText = `❌ ${data.error}`;
                statusDiv.className = "error-text";
            }
        } catch (err) {
            statusDiv.innerText = "❌ Server Offline";
            statusDiv.className = "error-text";
        }
    }

    function toggleScheduleOptions() {
        const trigger = document.getElementById('trigger_source').value;
        const schedOptions = document.getElementById('schedule_options');
        if (trigger === 'Schedule') schedOptions.classList.remove('hidden');
        else schedOptions.classList.add('hidden');
    }

    function toggleTimeInput() {
        const type = document.getElementById('schedule_type').value;
        const timeDiv = document.getElementById('custom_time_div');
        if (type === 'custom') timeDiv.classList.remove('hidden');
        else timeDiv.classList.add('hidden');
    }

    function getBadge(target) {
        if (target === "Discord") return `<span class="badge badge-discord"><i class="fab fa-discord"></i> Discord</span>`;
        if (target === "Telegram") return `<span class="badge badge-telegram"><i class="fa-brands fa-telegram"></i> Telegram</span>`;
    }

    async function loadRules() {
        const listDiv = document.getElementById('rulesList');
        try {
            const response = await fetch(`${API_BASE}/get-rules`, { headers: getAuthHeaders() });
            
            if(response.status === 401 || response.status === 403) return logout();
            
            const rules = await response.json();
            
            if (rules.length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; color:#999; font-size:0.8rem;">No workflows configured.</p>';
                return;
            }

            listDiv.innerHTML = rules.map(r => `
                <div class="rule-card">
                    <button class="delete-btn" onclick="deleteRule('${r._id}')"><i class="fas fa-trash-alt"></i></button>
                    ${getBadge(r.action_target)}
                    <div class="rule-info">${r.trigger_source === "Schedule" ? '⏰ Scheduled' : '⚡ Webhook'}</div>
                    <div class="rule-payload">"${r.action_payload}"</div>
                    <div class="rule-destination">ID: ${r.target_id || 'Not Set'}</div>
                </div>
            `).join('');
        } catch (err) {
            listDiv.innerHTML = '<p class="error-text">❌ Connection Lost.</p>';
        }
    }

    async function deleteRule(id) {
        if (!confirm("Are you sure?")) return;
        try {
            const response = await fetch(`${API_BASE}/delete-rule/${id}`, { 
                method: 'DELETE',
                headers: getAuthHeaders() 
            });
            if (response.status === 401 || response.status === 403) return logout();
            if (response.ok) loadRules(); 
        } catch (err) {}
    }

    async function saveRule() {
        const statusDiv = document.getElementById('status');
        const data = {
            trigger_source: document.getElementById('trigger_source').value,
            action_target: document.getElementById('action_target').value,
            action_payload: document.getElementById('action_payload').value,
            target_id: document.getElementById('target_id').value,
            cron_schedule: document.getElementById('trigger_source').value === 'Schedule' 
                ? (document.getElementById('schedule_type').value === 'custom' 
                    ? `${document.getElementById('custom_time').value.split(':')[1]} ${document.getElementById('custom_time').value.split(':')[0]} * * *` 
                    : document.getElementById('schedule_type').value) 
                : "* * * * *"
        };

        if (!data.action_payload || !data.target_id) {
            statusDiv.innerText = "⚠️ Payload and Target ID required";
            statusDiv.className = "error-text";
            return;
        }

        statusDiv.innerText = "Deploying...";
        try {
            const response = await fetch(`${API_BASE}/save-rule`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(data)
            });

            if (response.status === 401 || response.status === 403) return logout();

            if (response.ok) {
                statusDiv.innerText = "✨ Rule Deployed!";
                statusDiv.className = "success-text";
                document.getElementById('action_payload').value = "";
                document.getElementById('target_id').value = "";
                loadRules(); 
            }
        } catch (err) {
            statusDiv.innerText = "❌ Backend Offline";
            statusDiv.className = "error-text";
        }
    }

    window.onload = () => {
        checkAuth(); 
        toggleScheduleOptions(); 
    };
</script>

</body>
</html>
